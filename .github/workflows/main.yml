
name: CI/CD Docker

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🔥 Build project (QUAN TRỌNG)
    - name: Build JAR
      run: mvn clean package -DskipTests

    # 🔥 Login Docker Hub
    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🔥 Build Docker Image
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bookstore-app:latest .

    # 🔥 Push Docker Image
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/bookstore-app:latest

    # 🔥 Deploy (ĐÃ FIX PORT + LOG)
    - name: Triển khai lên DevOps Classroom
      run: |
        REPO="${{ secrets.DOCKERHUB_USERNAME }}/bookstore-app"
        CONTAINER_PORT=8081

        echo "Deploying $REPO..."

        RESPONSE=$(curl -sS -m 60 -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=4&container_port=$CONTAINER_PORT&strict_container_port=0")

        BODY=$(echo "$RESPONSE" | sed "$d")
        CODE=$(echo "$RESPONSE" | tail -n1)

        echo "Webhook HTTP: $CODE"

        echo "::group::Chi tiết webhook JSON"
        echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        echo "::endgroup::"

        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "❌ Deploy thất bại!"
          exit 1
        fi

        echo "✅ Deploy thành công!"
