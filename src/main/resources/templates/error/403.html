<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>403 Forbidden</title>
</head>

<body>
    <div layout:fragment="content" class="container text-center py-5">
        <div class="error-container py-5">
            <h1 class="display-1 fw-bold text-warning animate__animated animate__pulse animate__infinite">403</h1>
            <h2 class="mb-4 animate__animated animate__fadeInUp animate__delay-1s">Access Denied</h2>
            <p class="lead mb-5 animate__animated animate__fadeInUp animate__delay-2s">
                You don't have permission to access this page. Please contact the administrator if you believe this is
                an error.
            </p>
            <div class="animate__animated animate__fadeInUp animate__delay-3s">
                <a href="/" class="btn btn-warning btn-lg px-5 shadow-sm hover-lift text-white">
                    <i class="bi bi-shield-lock me-2"></i>Return Home
                </a>
            </div>
        </div>

        <!-- Additional Styles for 403 Page -->
        <style>
            .error-container {
                min-height: 60vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .display-1 {
                font-size: 8rem;
                text-shadow: 4px 4px 0px rgba(255, 193, 7, 0.1);
            }

            .hover-lift {
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }

            .hover-lift:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
            }

            @keyframes pulse {
                from {
                    transform: scale3d(1, 1, 1);
                }

                50% {
                    transform: scale3d(1.05, 1.05, 1.05);
                }

                to {
                    transform: scale3d(1, 1, 1);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translate3d(0, 100%, 0);
                }

                to {
                    opacity: 1;
                    transform: translate3d(0, 0, 0);
                }
            }

            .animate__animated {
                animation-duration: 1s;
                animation-fill-mode: both;
            }

            .animate__pulse {
                animation-name: pulse;
            }

            .animate__infinite {
                animation-iteration-count: infinite;
            }

            .animate__fadeInUp {
                animation-name: fadeInUp;
            }

            .animate__delay-1s {
                animation-delay: 0.2s;
            }

            .animate__delay-2s {
                animation-delay: 0.4s;
            }

            .animate__delay-3s {
                animation-delay: 0.6s;
            }
        </style>
    </div>
</body>

</html>
