<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>500 Internal Server Error</title>
</head>

<body>
    <div layout:fragment="content" class="container text-center py-5">
        <div class="error-container py-5">
            <h1 class="display-1 fw-bold text-danger animate__animated animate__shakeX">500</h1>
            <h2 class="mb-4 animate__animated animate__fadeInUp animate__delay-1s">Internal Server Error</h2>
            <p class="lead mb-5 animate__animated animate__fadeInUp animate__delay-2s">
                Something went wrong on our end. We're working on fixing it as soon as possible.
            </p>
            <div class="animate__animated animate__fadeInUp animate__delay-3s">
                <a href="/" class="btn btn-danger btn-lg px-5 shadow-sm hover-lift">
                    <i class="bi bi-house-door me-2"></i>Return Home
                </a>
            </div>
        </div>

        <!-- Additional Styles for 500 Page -->
        <style>
            .error-container {
                min-height: 60vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .display-1 {
                font-size: 8rem;
                text-shadow: 4px 4px 0px rgba(220, 53, 69, 0.1);
            }

            .hover-lift {
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }

            .hover-lift:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
            }

            @keyframes shakeX {

                from,
                to {
                    transform: translate3d(0, 0, 0);
                }

                10%,
                30%,
                50%,
                70%,
                90% {
                    transform: translate3d(-10px, 0, 0);
                }

                20%,
                40%,
                60%,
                80% {
                    transform: translate3d(10px, 0, 0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translate3d(0, 100%, 0);
                }

                to {
                    opacity: 1;
                    transform: translate3d(0, 0, 0);
                }
            }

            .animate__animated {
                animation-duration: 1s;
                animation-fill-mode: both;
            }

            .animate__shakeX {
                animation-name: shakeX;
            }

            .animate__fadeInUp {
                animation-name: fadeInUp;
            }

            .animate__delay-1s {
                animation-delay: 0.2s;
            }

            .animate__delay-2s {
                animation-delay: 0.4s;
            }

            .animate__delay-3s {
                animation-delay: 0.6s;
            }
        </style>
    </div>
</body>

</html>
