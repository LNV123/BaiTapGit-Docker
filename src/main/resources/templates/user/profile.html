<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Tài Khoản | HUTECH Store</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
</head>

<body class="bg-light">
    <th:block th:replace="~{layout::header}"></th:block>

    <div class="container py-5 animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="row g-4">
                    <!-- Left Sidebar -->
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm p-4 text-center">
                            <div class="position-relative d-inline-block mx-auto mb-3">
                                <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                                    style="width: 120px; height: 120px;">
                                    <span class="display-3 text-primary fw-bold"
                                        th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</span>
                                </div>
                                <span
                                    class="position-absolute bottom-0 end-0 bg-success border border-white border-3 rounded-circle"
                                    style="width: 25px; height: 25px;"></span>
                            </div>
                            <h4 class="fw-bold mb-1 text-dark" th:text="${user.username}">Username</h4>
                            <p class="text-muted small mb-3" th:text="${user.email}">user@hutech.vn</p>

                            <div class="d-flex justify-content-center gap-1 mb-4">
                                <span th:each="role : ${user.roles}" th:text="${role.name}"
                                    class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle px-3 py-2">Quyền
                                    hạn</span>
                            </div>

                            <div class="list-group list-group-flush text-start border-top pt-3">
                                <a th:href="@{/profile}"
                                    class="list-group-item list-group-item-action border-0 rounded-3 mb-1 py-3 px-4 active">
                                    <i class="bi bi-person me-3"></i>Tổng Quan Tài Khoản
                                </a>
                                <a th:href="@{/orders}"
                                    class="list-group-item list-group-item-action border-0 rounded-3 mb-1 py-3 px-4">
                                    <i class="bi bi-clock-history me-3"></i>Lịch Sử Mua Hàng
                                </a>
                                <a href="#"
                                    class="list-group-item list-group-item-action border-0 rounded-3 mb-1 py-3 px-4 text-danger">
                                    <i class="bi bi-shield-lock me-3"></i>Thiết Lập Bảo Mật
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="col-md-8">
                        <div class="card border-0 shadow-sm p-4 mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">Thông Tin Cá Nhân</h5>
                                <a th:href="@{/profile/edit}" class="btn btn-outline-primary btn-sm px-4 rounded-pill">
                                    <i class="bi bi-pencil-square me-1"></i>Chỉnh Sửa
                                </a>
                            </div>

                            <div class="row g-4 pt-2">
                                <div class="col-sm-6">
                                    <label class="text-muted small text-uppercase fw-bold letter-spacing-sm">Tên đăng
                                        nhập</label>
                                    <div class="fw-bold mt-1 text-dark fs-5" th:text="${user.username}">user_dev</div>
                                </div>
                                <div class="col-sm-6">
                                    <label class="text-muted small text-uppercase fw-bold letter-spacing-sm">Địa chỉ
                                        Email</label>
                                    <div class="fw-bold mt-1 text-dark fs-5" th:text="${user.email}">user@hutech.vn
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <label class="text-muted small text-uppercase fw-bold letter-spacing-sm">Số điện
                                        thoại</label>
                                    <div class="fw-bold mt-1 text-dark fs-5" th:text="${user.phone ?: 'Chưa cung cấp'}">
                                        0123456789</div>
                                </div>
                                <div class="col-sm-6">
                                    <label class="text-muted small text-uppercase fw-bold letter-spacing-sm">Phương thức
                                        đăng nhập</label>
                                    <div class="mt-1">
                                        <span th:text="${user.provider ?: 'Nội bộ'}"
                                            class="badge px-3 py-2 rounded-pill"
                                            th:classappend="${user.provider == 'Google' ? 'bg-danger bg-opacity-10 text-danger border border-danger-subtle' : 'bg-success bg-opacity-10 text-success border border-success-subtle'}">Nội
                                            bộ</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="card border-0 shadow-sm p-4 bg-primary text-white position-relative overflow-hidden">
                            <div class="position-absolute top-0 end-0 p-3 opacity-10">
                                <i class="bi bi-trophy display-1"></i>
                            </div>
                            <div class="position-relative z-1">
                                <h5 class="fw-bold">Thành Viên Hạng Bạc</h5>
                                <p class="mb-0 opacity-75">Cảm ơn bạn đã đồng hành cùng HUTECH Bookstore. Bạn đã mở khóa
                                    các đặc quyền <strong>thành viên SILVER</strong>.</p>
                                <div class="mt-3">
                                    <a href="/"
                                        class="btn btn-white btn-sm px-4 rounded-pill fw-bold text-primary bg-white text-decoration-none border-0">Xem
                                        ưu đãi</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
