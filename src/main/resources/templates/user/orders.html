<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Đơn Hàng | HUTECH Store</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
</head>

<body class="bg-light">
    <th:block th:replace="~{layout::header}"></th:block>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card border-0 shadow-sm p-4 animate-fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="d-flex align-items-center">
                            <a th:href="@{/profile}" class="btn btn-light rounded-circle me-3">
                                <i class="bi bi-arrow-left"></i>
                            </a>
                            <h4 class="fw-bold mb-0">Lịch Sử Mua Hàng</h4>
                        </div>
                        <span class="badge bg-primary rounded-pill px-3"
                            th:text="${#lists.size(invoices)} + ' Đơn hàng'">0 Đơn hàng</span>
                    </div>

                    <div th:if="${#lists.isEmpty(invoices)}" class="text-center py-5">
                        <div class="bg-light d-inline-flex p-4 rounded-circle mb-3">
                            <i class="bi bi-cart-x text-muted fs-1"></i>
                        </div>
                        <h5>Bạn chưa có đơn hàng nào</h5>
                        <p class="text-muted small">Hãy tiếp tục khám phá những cuốn sách hay tại cửa hàng chúng tôi.
                        </p>
                        <a th:href="@{/books}" class="btn btn-primary px-4 rounded-pill mt-3">Đến Cửa Hàng</a>
                    </div>

                    <div th:unless="${#lists.isEmpty(invoices)}" class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="border-0 px-4 py-3">Mã Đơn</th>
                                    <th class="border-0 py-3">Ngày Đặt</th>
                                    <th class="border-0 py-3">Tổng Tiền</th>
                                    <th class="border-0 py-3">Trạng Thái</th>
                                    <th class="border-0 px-4 py-3 text-end">Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="invoice : ${invoices}">
                                    <td class="px-4 py-3 fw-bold text-primary" th:text="'#' + ${invoice.id}">#123</td>
                                    <td class="py-3 text-muted"
                                        th:text="${#dates.format(invoice.invoiceDate, 'HH:mm dd/MM/yyyy')}">10:00
                                        01/01/2026</td>
                                    <td class="py-3 fw-bold"
                                        th:text="${#numbers.formatDecimal(invoice.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                        100.000 đ</td>
                                    <td class="py-3">
                                        <span class="badge rounded-pill px-3 py-2"
                                              th:classappend="${invoice.status == 'Đặt hàng thành công' ? 'bg-success bg-opacity-10 text-success border border-success-subtle' : (invoice.status == 'Đơn hàng bị hủy' ? 'bg-danger bg-opacity-10 text-danger border border-danger-subtle' : 'bg-warning bg-opacity-10 text-warning border border-warning-subtle')}"
                                              th:text="${invoice.status}">
                                        </span>
                                    </td>
                                    <td class="px-4 py-3 text-end">
                                        <a th:href="@{/orders/detail/{id}(id=${invoice.id})}"
                                            class="btn btn-sm btn-primary rounded-pill px-4 shadow-sm">
                                            <i class="bi bi-eye me-1"></i>Xem chi tiết
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
