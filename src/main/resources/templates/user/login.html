<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | HUTECH Store</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
</head>

<body style="background: #f6f7fc;">
    <th:block th:replace="~{layout :: header}"></th:block>
    <div class="container py-5 h-100">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-12 col-lg-6 col-md-8 col-xl-5">
                <div class="card shadow border-0" style="border-radius: 1.5rem;">
                    <div class="card-body p-5">
                        <!-- Căn giữa tiêu đề -->
                        <div class="text-center">
                            <h3 class="fw-bold">Đăng nhập vào <span class="text-primary">Bookstore</span></h3>
                            <p class="mb-4 text-muted">Vui lòng nhập tài khoản và mật khẩu của bạn.</p>

                            <a href="/oauth2/authorization/google"
                                class="btn btn-outline-danger w-100 py-2 d-flex align-items-center justify-content-center gap-2 mb-3 shadow-sm"
                                role="button">
                                <i class="bi bi-google"></i>
                                Đăng nhập với Google
                            </a>
                        </div>

                        <div class="d-flex align-items-center my-4">
                            <hr class="flex-grow-1">
                            <span class="mx-3 text-muted small">HOẶC</span>
                            <hr class="flex-grow-1">
                        </div>

                        <!-- Fixed method and centered content -->
                        <form th:action="@{/login}" method="post">
                            <div th:if="${param.error}" class="alert alert-danger border-0 small py-2 text-center">
                                Tên đăng nhập hoặc mật khẩu không chính xác.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-success border-0 small py-2 text-center">
                                Bạn đã đăng xuất thành công.
                            </div>

                            <div class="form-group mb-3 text-center">
                                <label for="username" class="form-label small fw-bold">Tên đăng nhập</label>
                                <input type="text" class="form-control text-center" required id="username"
                                    name="username" placeholder="Nhập tên đăng nhập">
                            </div>
                            <div class="form-group mb-3 text-center">
                                <label for="password" class="form-label small fw-bold">Mật khẩu</label>
                                <input type="password" class="form-control text-center" required id="password"
                                    name="password" placeholder="Nhập mật khẩu">
                            </div>

                            <div class="form-check d-flex justify-content-center mb-4">
                                <input type="checkbox" class="form-check-input" name="remember-me" id="remember-me">
                                <label class="form-check-label ms-2 small" for="remember-me">Ghi nhớ tôi</label>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit"
                                    class="btn btn-primary btn-lg fw-bold shadow-sm d-flex align-items-center justify-content-center">Đăng
                                    Nhập</button>
                                <p class="mt-3 mb-0 small text-center">
                                    Bạn chưa có tài khoản?
                                    <a class="text-primary fw-bold text-decoration-none" th:href="@{/register}">Đăng ký
                                        ngay</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:replace="~{layout :: footer}"></th:block>
</body>

</html>
