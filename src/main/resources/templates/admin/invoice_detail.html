<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Đơn Hàng | Admin</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
</head>
<body class="bg-light d-flex flex-column h-100">
    <th:block th:replace="~{layout::header}"></th:block>
    <main class="flex-shrink-0">
    <div class="container py-5 animate-fade-in">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <h2 class="fw-bold mb-0">
                <a th:href="@{/admin/invoices}" class="text-decoration-none text-muted me-2"><i class="bi bi-arrow-left-circle"></i></a>
                Chi Tiết Đơn Hàng <span class="text-primary" th:text="'#' + ${invoice.id}"></span>
            </h2>
        </div>

        <div class="row g-4">
            <!-- Thông tin đơn hàng -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                        <h5 class="fw-bold"><i class="bi bi-info-circle text-primary me-2"></i>Thông Tin Chung</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <span class="text-muted d-block small mb-1">Khách Hàng</span>
                            <span class="fw-semibold" th:text="${invoice.user != null ? invoice.user.username : 'Khách vãng lai'}"></span>
                        </div>
                        <div class="mb-3">
                            <span class="text-muted d-block small mb-1">Ngày Đặt</span>
                            <span class="fw-semibold" th:text="${#calendars.format(invoice.invoiceDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                        <div class="mb-3">
                            <span class="text-muted d-block small mb-1">Tổng Tiền</span>
                            <span class="fw-bold text-danger fs-5" th:text="${#numbers.formatDecimal(invoice.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <hr>
                        <form th:action="@{'/admin/invoices/update-status/' + ${invoice.id}}" method="post" class="mt-4">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">Cập Nhật Trạng Thái:</label>
                                <select class="form-select border-primary shadow-none" name="status">
                                    <option value="Đơn hàng đang xử lý" th:selected="${invoice.status == 'Đơn hàng đang xử lý'}">Đơn hàng đang xử lý</option>
                                    <option value="Đặt hàng thành công" th:selected="${invoice.status == 'Đặt hàng thành công'}">Đặt hàng thành công</option>
                                    <option value="Đơn hàng bị hủy" th:selected="${invoice.status == 'Đơn hàng bị hủy'}">Đơn hàng bị hủy</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold">
                                <i class="bi bi-check2-circle"></i> Cập Nhật
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                        <h5 class="fw-bold"><i class="bi bi-box-seam text-primary me-2"></i>Sản Phẩm Đã Mua</h5>
                    </div>
                    <div class="card-body p-0 mt-3">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light text-muted small">
                                    <tr>
                                        <th class="ps-4">Sản Phẩm</th>
                                        <th class="text-center">Đơn Giá</th>
                                        <th class="text-center">Số Lượng</th>
                                        <th class="text-end pe-4">Thành Tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${invoice.itemInvoices}" class="align-middle">
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center">
                                                <div th:if="${item.book.imageUrl != null and !item.book.imageUrl.isEmpty()}" class="me-3">
                                                    <img th:src="@{${item.book.imageUrl}}" class="rounded shadow-sm" style="width: 50px; height: 75px; object-fit: cover;">
                                                </div>
                                                <div>
                                                    <h6 class="mb-0 fw-semibold" th:text="${item.book.title}"></h6>
                                                    <small class="text-muted" th:text="${item.book.author}">Tác giả</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="text-center" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        <td class="text-center">
                                            <span class="badge bg-secondary rounded-pill px-3" th:text="${item.quantity}"></span>
                                        </td>
                                        <td class="text-end pe-4 fw-semibold text-primary" 
                                            th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </main>
    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
